<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: black;
        color: #00ff00;
    }

    form {
        width: 400px;
        margin: 30px auto;
        background-color: #111;
        padding: 20px;
        border: 2px solid #00ff00;
        border-radius: 8px;
    }

    h1 {
        text-align: center;
        color: #00ff00;
        margin-bottom: 10px;
    }

    label {
        display: block;
        margin-top: 10px;
        color: #00ff00;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        border: 1px solid #00ff00;
        background-color: black;
        color: #00ff00;
        border-radius: 4px;
        box-sizing: border-box;
    }

    input::placeholder {
        color: #666;
    }

    .radio-group,
    .checkbox-group {
        margin-top: 5px;
        margin-bottom: 10px;
    }

    .radio-group label,
    .checkbox-group label {
        display: inline;
        margin-left: 5px;
    }

    .radio-group input,
    .checkbox-group input {
        width: auto;
        margin-right: 5px;
    }

    button {
        padding: 10px;
        width: 48%;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }

    .clearfix {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
    }

    button[type="submit"] {
        background-color: #00ff00;
        color: black;
    }

    button[type="button"] {
        background-color: black;
        color: #00ff00;
        border: 1px solid #00ff00;
    }

    .small-btn {
        width: 100%;
        background-color: #00ff00;
        color: black;
        margin-top: -5px;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<script>
function togglePassword() {
    let pass = document.getElementById("psw");
    let confirm = document.getElementById("psw-repeat");

    if (pass.type === "password") {
        pass.type = "text";
        confirm.type = "text";
    } else {
        pass.type = "password";
        confirm.type = "password";
    }
}

function RegistrationSummary(event){
    event.preventDefault();

    let name = document.getElementById("fullName").value;
    let email = document.getElementById("email").value;
    let psw = document.getElementById("psw").value;
    let psw_repeat = document.getElementById("psw-repeat").value;
    let age = document.getElementById("age").value;
    let country = document.getElementById("country").value;

    let gender = "";
    if (document.getElementById("male").checked) {
        gender = "Male";
    } 
    else if (document.getElementById("female").checked) {
        gender = "Female";
    } 
    else if (document.getElementById("other").checked) {
        gender = "Other";
    }

    if (psw !== psw_repeat) {
        alert("Passwords do not match.");
        return;
    }

    alert(
        "REGISTRATION SUMMARY\n" +
        "----------------------------\n" +
        "Full Name: " + name + "\n" +
        "Email: " + email + "\n" +
        "Age: " + age + "\n" +
        "Gender: " + gender + "\n" +
        "Country: " + country + "\n\n" +
        "TERMS & CONDITIONS\n" +
        "----------------------------\n" +
        "By creating an account, you agree that all information provided is true and accurate.\n" +
        "You also agree to follow the platform rules and privacy policy."
    );
}
</script>

<form>

<h1>Registration Form</h1>

<label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter Full Name">

<label>Email</label>
<input type="text" id="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" id="psw" placeholder="Enter Password">

<label>Confirm Password</label>
<input type="password" id="psw-repeat" placeholder="Confirm Password">

<button type="button" class="small-btn" onclick="togglePassword()">
    Show / Hide Password
</button>

<label>Age</label>
<input type="number" id="age" placeholder="Enter Age">

<label>Gender</label>
<div class="radio-group">
    <input type="radio" name="gender" id="male">
    <label for="male">Male</label><br>

    <input type="radio" name="gender" id="female">
    <label for="female">Female</label><br>

    <input type="radio" name="gender" id="other">
    <label for="other">Other</label>
</div>

<label>Country</label>
<select id="country">
    <option>USA</option>
    <option>UK</option>
    <option>Brazil</option>
    <option>China</option>
    <option>Japan</option>
    <option>Philippines</option>
    <option>Korea</option>
</select>

<div class="checkbox-group">
    <input type="checkbox" id="agree">
    <label for="agree">I agree to Terms & Privacy</label>
</div>

<div class="clearfix">
    <button type="button">Clear Form</button>
    <button type="submit" onclick="RegistrationSummary(event)">Register</button>
</div>

</form>

</body>
</html>
