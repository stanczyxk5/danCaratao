<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Carousel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#3a3a3a;
    font-family:'Times New Roman', Times, serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

.card{
    max-width:700px;
    width:100%;
    background:rgb(140,0,0);
    border-radius:2rem;
    padding:2rem;
    box-shadow:0 15px 30px #be7575;
    text-align:center;
}

h2{
    color:#522121;
    margin-bottom:1.8rem;
    font-size:2rem;
}

/* carousel */
.carousel{
    display:flex;
    overflow-x:auto;
    gap:1.2rem;
    scroll-snap-type:x mandatory;
    padding-bottom:1rem;
}

.carousel-item{
    scroll-snap-align:start;
    flex:0 0 auto;
    width:220px;
    height:150px;
    background:#b56262;
    border-radius:1.5rem;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 12px #cf8787;
    border:3px solid white;
}

.carousel-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:1.4rem;
}

/* navigation */
.nav{
    margin-top:15px;
}

.nav a{
    text-decoration:none;
    background:white;
    color:#7a0000;
    padding:6px 10px;
    border-radius:8px;
    margin:4px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">
<h2>GOATED ALBUMS</h2>

<div class="carousel">

<div class="carousel-item" id="slide1">
<img src="cimages/amylee.jpg">
</div>

<div class="carousel-item" id="slide2">
<img src="cimages/avrilbaddie.jpg">
</div>

<div class="carousel-item" id="slide3">
<img src="cimages/emilylk.jpg">
</div>

<div class="carousel-item" id="slide4">
<img src="cimages/paramore.jpg">
</div>

<div class="carousel-item" id="slide5">
<img src="cimages/mazzystar.jpg">
</div>

<div class="carousel-item" id="slide6">
<img src="cimages/mcr.jpg">
</div>

</div>

<div class="nav">
<a href="#slide1">Image 1</a>
<a href="#slide2">Image 2</a>
<a href="#slide3">Image 3</a>
<a href="#slide4">Image 4</a>
<a href="#slide5">Image 5</a>
<a href="#slide6">Image 6</a>
</div>

</div>

</body>
</html>
