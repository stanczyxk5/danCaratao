<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body {
    background: linear-gradient(135deg, #000000, #1a1a1a);
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ===== NAVBAR ===== */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 20px;
    background: #0a0a0a;
    border-bottom: 2px solid #88ff00;
    z-index: 1000;
}

/* ALWAYS visible button (important fix) */
.menu-btn {
    display: block;
    background: none;
    border: 1px solid #88ff00;
    color: #88ff00;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
}

.nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 55px;
    right: 20px;
    background: #111;
    border: 1px solid #88ff00;
    border-radius: 6px;
    width: 160px;
    padding: 10px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    font-weight: bold;
    padding: 8px;
    text-align: center;
    border-radius: 4px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #88ff00;
    color: #000;
}

.nav-links a.active {
    background: #88ff00;
    color: #000;
}

.nav-links.show {
    display: flex;
}

/* ===== CONTENT ===== */
h1 {
    text-align: center;
    color: rgb(136, 255, 0);
    margin: 30px 0;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #2c2c2c;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgb(136, 255, 0);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    text-align: center;
    color: #bbffc1;
    font-weight: bold;
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="quiz.html" class="active">Quiz</a>
        <a href="lab.html">Laboratory</a>
        <a href="exam.html">Exam</a>
    </div>
</div>

<h1>Quiz</h1>

<div class="gallery">

<div class="card" onclick="openModal(this)">
    <img src="qImages/quiz1.jpg" alt="Quiz 1">
    <p>Quiz 1</p>
</div>

<div class="card" onclick="openModal(this)">
    <img src="qImages/quiz2.jpg" alt="Quiz 2">
    <p>Quiz 2</p>
</div>

<div class="card" onclick="openModal(this)">
    <img src="qImages/quiz3.1.jpg" alt="Quiz 3.1">
    <p>Quiz 3.1</p>
</div>

<div class="card" onclick="openModal(this)">
    <img src="qImages/quiz3.2.jpg" alt="Quiz 3.2">
    <p>Quiz 3.2</p>
</div>

<div class="card" onclick="openModal(this)">
    <img src="qImages/carousel.jpg" alt="Carousel">
    <p>Carousel</p>
</div>

</div>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
function toggleMenu() {
    const nav = document.getElementById("navLinks");
    nav.classList.toggle("show");
}

function openModal(card) {
    const img = card.querySelector("img").src;
    document.getElementById("modalImg").src = img;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
