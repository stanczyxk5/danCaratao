<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Upload</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgb(136, 255, 0);
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            margin: 0 25px;
            font-size: 16px;
        }

        .navbar a:hover {
            color: white;
        }

        /* CONTAINER */
        .container {
            border: 5px solid rgb(136, 255, 0);
            width: 900px;
            max-width: 90%;
            padding: 30px;
            background-color: rgb(44, 44, 44);
            margin: 50px auto;
            color: #bbffc1;
        }

        h1 {
            text-align: center;
            color: rgb(136, 255, 0);
        }

        /* FORM */
        .form-group {
            margin: 20px 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background-color: rgb(136, 255, 0);
            color: black;
            padding: 12px 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
        }

        button:hover {
            background-color: #aaff33;
        }

        #message {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="quiz.html">Quiz Upload</a>
    <a href="lab.html">Lab Upload</a>
    <a href="exam.html">Exam Upload</a>
</div>

<!-- MAIN -->
<div class="container">
    <h1>Quiz Upload</h1>

    <form onsubmit="submitQuiz(event)">
        
        <div class="form-group">
            <label>Quiz Title</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label>Upload Quiz File</label>
            <input type="file" id="file" required>
        </div>

        <div class="form-group">
            <label>Upload Proof (Image)</label>
            <input type="file" id="image" accept="image/*" required>
        </div>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
</div>

<script>
function submitQuiz(event) {
    event.preventDefault();

    // get existing quiz count
    let quizCount = localStorage.getItem("quizCount") || 0;
    quizCount++;

    // save updated count
    localStorage.setItem("quizCount", quizCount);

    // update total uploads too
    let total = localStorage.getItem("totalUploads") || 0;
    total++;
    localStorage.setItem("totalUploads", total);

    document.getElementById("message").textContent = "Quiz uploaded successfully!";
}
</script>

</body>
</html>
