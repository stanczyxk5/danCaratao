<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<link rel="stylesheet" href="navbar.css">

<style>
body {
    background: linear-gradient(135deg, #000000, #1a1a1a);
    margin: 0;
   font-family: "Courier New", Courier, monospace;
}


h1 {
    text-align: center;
    color: rgb(136, 255, 0);
    margin: 30px 0;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #2c2c2c;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgb(136, 255, 0);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    text-align: center;
    color: #bbffc1;
    font-weight: bold;
}


.modal {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">[Home]</a>
        <a href="dashboard.html">[Dashboard]</a>
        <a href="quiz.html" class="active">[Quiz]</a>
        <a href="lab.html">[Laboratory]</a>
        <a href="exam.html">[Exam]</a>
    </div>
</div>

<h1>>Quiz$$</h1>

<div class="gallery">

    <div class="card" onclick="openModal(this)">
        <img src="qImages/quiz1.jpg" alt="Quiz 1">
        <p>>quiz_1</p>
    </div>

    <div class="card" onclick="openModal(this)">
        <img src="qImages/quiz2.jpg" alt="Quiz 2">
        <p>>quiz_2</p>
    </div>

    <div class="card" onclick="openModal(this)">
        <img src="qImages/quiz3.1.jpg" alt="Quiz 3.1">
        <p>>quiz_3.1</p>
    </div>

    <div class="card" onclick="openModal(this)">
        <img src="qImages/quiz3.2.jpg" alt="Quiz 3.2">
        <p>>quiz_3.2</p>
    </div>

<div class="card" onclick="openModal(this)">
        <img src="qImages/Screenshot_2026-04-21-19-58-53-512_com.brave.browser-edit.jpg" alt="Long Quiz">
        <p>>long_Quiz@</p>
</div>
    
    <div class="card" onclick="openModal(this)">
        <img src="qImages/carousel.jpg" alt="Carousel">
        <p>>carousel@</p>
    </div>

    
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script src="navbar.js"></script>

<script>
function openModal(card) {
    const img = card.querySelector("img").src;
    document.getElementById("modalImg").src = img;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
