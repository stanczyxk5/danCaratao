<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;

    font-family: "Courier New", monospace;

    background: url("https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWJ3bnQ4cmhkY2p2aDJ3bDBwZmtvMGZxcHJybXNocG9sb3BtMzcyayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/QKDpE67Rc7rpjBmQPj/giphy.gif")
        no-repeat center center;

    background-size: cover;
    background-color: #000;

    color: #bbffc1;

    overflow-x: hidden;
    overflow-y: hidden;
}

*, *::before, *::after {
    box-sizing: border-box;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    width: 100%;
    padding: 10px 12px;
    border-bottom: 1px solid #88ff00;
    background: #000;
}

.logo {
    color: #88ff00;
    font-weight: bold;
    white-space: nowrap;
}

.menu-toggle {
    display: none;
    font-size: 20px;
    color: #88ff00;
    cursor: pointer;
    position: relative;
    font-weight: bold;
    letter-spacing: 2px;
}

.menu-toggle::before,
.menu-toggle::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
}

.menu-toggle::before {
    color: #00ffea;
    animation: glitch1 0.6s infinite;
}

.menu-toggle::after {
    color: #ff008c;
    animation: glitch2 0.6s infinite;
}

@keyframes glitch1 {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(-1px, -1px); }
    60% { transform: translate(2px, 0); }
    80% { transform: translate(1px, -2px); }
    100% { transform: translate(0); }
}

@keyframes glitch2 {
    0% { transform: translate(0); }
    20% { transform: translate(2px, -1px); }
    40% { transform: translate(1px, 1px); }
    60% { transform: translate(-2px, 0); }
    80% { transform: translate(-1px, 2px); }
    100% { transform: translate(0); }
}


.nav-links {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 18px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    transition: 0.2s;
    position: relative;
    display: inline-block;
}

.nav-links a:hover {
    color: #88ff00;
    text-shadow: 0 0 6px #88ff00;
}

.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 1px;
    background: #88ff00;
    transition: 0.2s;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a::before,
.nav-links a::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
    pointer-events: none;
}

.nav-links a::before {
    color: #00ffea;
    animation: glitch1 0.6s infinite;
}

.nav-links a::after {
    color: #ff008c;
    animation: glitch2 0.6s infinite;
}

.system-right {
    color: #777;
    font-size: 13px;
    white-space: nowrap;
}


@media (max-width: 700px) {

    html, body {
        height: 100dvh;
        background-position: center;
        background-size: cover;
        background-attachment: scroll;
    }

    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 55px;
        right: 10px;
        width: 160px;
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 10px;
        background: #000;
        border: 1px solid #88ff00;
        border-radius: 6px;
        z-index: 1000;
    }

    .nav-links.active {
        display: flex;
    }

    .system-right {
        width: 100%;
        text-align: center;
        margin-top: 4px;
        font-size: 12px;
    }
}

.container {
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

h1 {
    color: #88ff00;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

.mainCircle {
    width: min(420px, 90vw);
    height: min(420px, 90vw);
    margin: 40px auto;
    position: relative;
    border-radius: 50%;
    border: 3px solid #88ff00;
    background-image: url('https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3YWF4YTJwZXNka3BidXNwd3ZjeDlxOTJybDg1Z2dnanY1c3BtY3RqYiZlcD12MV9naWZzX3JlbGF0ZWQmY3Q9Zw/3oKIPlCroSFHV8uoko/giphy.gif');
    background-size: cover;
    background-position: center;
    top: 30px;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 150px;
    height: 150px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 3px solid #88ff00;
    background: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.center h3 {
    margin: 0;
    font-size: 50px;
    color: #88ff00;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: spin 15s linear infinite;
    z-index: 5;
}

.node {
    position: absolute;
    width: 200px;
    height: 80px;
    z-index: 6;
}

.node-inner {
    width: 100%;
    height: 100%;
    background: #111;
    border: 3px solid #88ff00;
    border-radius: 6px;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 10px;
    animation: counterSpin 15s linear infinite;
    color: #88ff00;
    position: relative;
    z-index: 7;
}
.glitch-num {
    position: relative;
    display: inline-block;
    color: #88ff00;
}

.glitch-num::before,
.glitch-num::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
    pointer-events: none;
}

.glitch-num::before {
    color: #00ffea;
    animation: glitch1 0.6s infinite;
}

.glitch-num::after {
    color: #ff008c;
    animation: glitch2 0.6s infinite;
}


.node:nth-child(1) {
    top: 10%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.node:nth-child(2) {
    top: 50%;
    left: 10%;
    transform: translate(-50%, -50%);
}

.node:nth-child(3) {
    top: 50%;
    left: 90%;
    transform: translate(-50%, -50%);
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes counterSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">stxnOS</div>

    <div class="menu-toggle" id="menuToggle" data-text="1">1</div>

    <div class="nav-links" id="navLinks">
        <a href="index.html" data-text=">index@">>index@</a>
        <a href="dashboard.html" data-text=">dashboard@">>dashboard@</a>
        <a href="outputs.html" data-text=">outputs@">>outputs@</a>
    </div>

    <div class="system-right" id="time"></div>
</div>

<div class="container">
<h1>>Dashboard@@</h1>

<div class="mainCircle">

    <div class="center">
        <h3>[7]</h3>
        <p>Total</p>
    </div>

    <div class="orbit">

        <div class="node">
            <div class="node-inner">
                <h3 class="glitch-num" data-text="[3]">[3]</h3>
                <p>Quiz</p>
            </div>
        </div>

        <div class="node">
            <div class="node-inner">
                <h3 class="glitch-num" data-text="[4]">[4]</h3>
                <p>Lab</p>
            </div>
        </div>

        <div class="node">
            <div class="node-inner">
                <h3 class="glitch-num" data-text="[0]">[0]</h3>
                <p>Exam</p>
            </div>
        </div>

    </div>

</div>
</div>

<script>
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", () => {
    nav.classList.toggle("active");

    toggle.textContent = toggle.textContent === "1" ? "0" : "1";
    toggle.setAttribute("data-text", toggle.textContent);
});

function updateTime() {
    document.getElementById("time").textContent =
        new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
