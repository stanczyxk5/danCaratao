<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #bbffc1;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 20px;
    background: #0a0a0a;
    border-bottom: 2px solid #88ff00;
    width: 100%;
    z-index: 1000;
}

.menu-btn {
    display: none;
    background: none;
    border: 1px solid #88ff00;
    color: #88ff00;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
}

.nav-links {
    display: flex;
}

.nav-links a {
    margin-left: 15px;
    color: #bbffc1;
    text-decoration: none;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 4px;
    transition: 0.3s;
}

.nav-links a:hover {
    background-color: #88ff00;
    color: #000;
}

.nav-links a.active {
    background-color: #88ff00;
    color: #000;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

h1 {
    color: #88ff00;
}

.panel {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    align-items: center;
    justify-content: center;
}

.main {
    flex: 2;
    background: #111;
    border: 3px solid #88ff00;
    padding: 50px 30px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.main h2 {
    font-size: 90px;
    color: #88ff00;
    margin: 0;
    line-height: 1;
}

.main p {
    font-size: 20px;
    margin-top: 10px;
    letter-spacing: 1px;
}

.side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.mini {
    background: #111;
    border: 1px solid #333;
    padding: 18px;
    border-radius: 8px;
    text-align: center;
}

.mini h3 {
    color: #88ff00;
    font-size: 32px;
    margin: 0;
}

.mini p {
    margin: 5px 0 0 0;
    font-size: 14px;
}

@media (max-width: 700px) {
    .menu-btn {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 55px;
        right: 20px;
        background: #111;
        border: 1px solid #88ff00;
        border-radius: 6px;
        display: none;
        flex-direction: column;
        width: 160px;
        padding: 10px;
    }

    .nav-links a {
        margin: 5px 0;
        text-align: center;
    }

    .nav-links.show {
        display: flex;
    }

    .panel {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="quiz.html">Quiz</a>
        <a href="lab.html">Laboratory</a>
        <a href="exam.html">Exam</a>
    </div>
</div>

<div class="container">

    <h1>Dashboard</h1>

    <div class="panel">

        <div class="main">
            <h2 id="total">7</h2>
            <p>Total Uploads</p>
        </div>

        <div class="side">
            <div class="mini">
                <h3 id="quiz">3</h3>
                <p>Quiz Uploads</p>
            </div>

            <div class="mini">
                <h3 id="lab">4</h3>
                <p>Lab Uploads</p>
            </div>

            <div class="mini">
                <h3 id="exam">0</h3>
                <p>Exam Uploads</p>
            </div>
        </div>

    </div>

</div>

<script>
function toggleMenu() {
    const nav = document.getElementById("navLinks");
    const btn = document.querySelector(".menu-btn");

    nav.classList.toggle("show");
    btn.textContent = nav.classList.contains("show") ? "Close" : "Menu";
}
</script>

</body>
</html>
