<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: #000;
    color: #bbffc1;
     overflow-x: hidden;
}
.navbar {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 20px;
    border-bottom: 1px solid #88ff00;
    background: #000;
}

.logo {
    color: #88ff00;
    font-weight: bold;
    flex: 0;
    white-space: nowrap;
}

.nav-links {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 18px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    transition: 0.2s;
    position: relative;
}

.nav-links a:hover {
    color: #88ff00;
    text-shadow: 0 0 6px #88ff00;
}

.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 1px;
    background: #88ff00;
    transition: 0.2s;
}

.nav-links a:hover::after {
    width: 100%;
}

.system-right {
    flex: 0;
    color: #777;
    font-size: 13px;
    white-space: nowrap;
}


@media (max-width: 700px) {
  

  .bigcircle {
    
    transform: scale(0.9);
  }
  .container {
    transform: scale(0.9);
  }
  .navbar{
    width: 100%;
  }
}


@media (min-width: 1024px) {
 .mainCircle {
    
    transform: scale(1.2) translateY(15px);
  }
 
  .navbar{
    width: 100%;
  }
  
}

.container {
    width: 90%;
    max-width: 900px;
    margin: 40px auto;
    text-align: center;
}

h1 {
    color: #88ff00;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}


.mainCircle {
    height: 450px;   
    width: 450px;
    border: 3px solid #88ff00;
    border-radius: 50%;
    background-image: url('image/mtrx.gif');
    display: flex;
    justify-content: center;
    align-items: center;
    
    margin: 40px auto; 
    z-index: 0;
}


.bigcircle {
    height: 300px;
    width: 300px;
    background-color: transparent;
    box-shadow: 5px #88ff00;
    padding: 30px 30px;
    border-radius: 50%;
    display: inline-block;
    margin-top: 10px;
    box-sizing: border-box;
    animation: 15s infinite spin linear;
    
}

.panel {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    justify-content: center;
    align-items: center;
    
}
.circle {
    display: flex;
    flex-direction: column;
    align-items: center;
    
    
}

.topc {
    height: 20px;
    width: 100px;
    background: #111;
    border: 3px solid #88ff00;
    padding: 30px 30px;
    border-radius: 5px;
    display: inline-block;
    animation: counterSpin 15s linear infinite;
}
.wrapper {
   transform: translateY(-145px);
   z-index: 2;
}


.main {
    height: 150px;
    width: 150px;
    background: #111;
    border: 3px solid #88ff00;
    padding: 30px 30px;
    border-radius: 50%;
    box-shadow: 3px #88ff00;
     animation: counterSpin 15s linear infinite;
    
}
.mainwrap {
    
    transform: translateY(-120px);
}

.main h3 {
    font-size: 65px;
    color: #88ff00;
    margin: 0;
    
    text-shadow: 0 0 15px rgb(136, 255, 0);
}


.scircle {
   display: flex;
    flex-direction: row;
    align-items: center;   
    justify-content: center; 
    gap: 6px; 
    text-align: center;
    transform: translateY(-15PX);
}

.scircle h2 {
    color: #88ff00;
    text-shadow: 0 0 15px rgb(136, 255, 0);
    margin-right: 10px;
    
}

.scircle p {
   font-size: 19px;
}


.twin {
    display: flex;
    flex-direction: row;
      transform: translateY(-180px);
    
}

.rightc {
    height: 20px;
    width: 100px;
    background: #111;
    border: 3px solid #88ff00;
    padding: 30px 30px;
    display: inline-block;
    margin-left: 75px;
    border-radius: 5px;
    animation: counterSpin 15s linear infinite;

}

.leftc {
    height: 20px;
    width: 100px;
    background: #111;
    border: 3px solid #88ff00;
    padding: 30px 30px;
    border-radius: 5px;
    display: inline-block;
    margin-right: 75px;
    animation: counterSpin 15s linear infinite;
    
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

@keyframes counterSpin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(-360deg);
  }
}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">stxnOS</div>

    <div class="nav-links">
        <a href="index.html">>index@</a>
        <a href="dashboard.html">>dashboard@</a>
        <a href="outputs.html">>outputs@</a>
    </div>

    <div class="system-right" id="time"></div>

</div>


    <div class="container">
    
        <h1>>Dashboard@@</h1>
          <div class="mainCircle">

          <div class="bigcircle">
          
            <div class="panel">
              <div class="circle">
              
                 <div class="wrapper">
                    <div class="topc">
                        <div class="scircle">
                          <h2>[3]</h2>
                          <p>quiz@</p>
                        </div>  
                    </div>
                 </div> 
        
                 <div class="mainwrap">
                    <div class="main">
                        <h3>[7]</h3>
                        <p>>Total Uploads</p>
                    </div>
                </div>            
                
                <div class="twin">
                  
                  <div class="leftc">
                    <div class="scircle">
                      <h2>[4]</h2>
                      <p>>lab@</p>
                    </div>   
                  </div>   
                  
                  <div class="rightc">
                    <div class="scircle">   
                      <h2>[0]</h2>
                      <p>>exam@</p>
                    </div>     
                  </div>   
                  
                </div>
              </div>
            </div>
    
          </div>
    
    </div>
   </div>
    

<script>
function updateTime() {
    document.getElementById("time").textContent =
        new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
