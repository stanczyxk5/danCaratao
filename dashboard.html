<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #bbffc1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgb(136, 255, 0);
            padding: 15px 0;
            text-align: center;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            margin: 0 25px;
            font-size: 16px;
        }

        .navbar a:hover {
            color: white;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 900px;
            width: 90%;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            color: rgb(136, 255, 0);
        }

        /* CARDS */
        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background-color: rgb(44, 44, 44);
            border: 3px solid rgb(136, 255, 0);
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            text-align: center;
        }

        .card h2 {
            margin: 10px 0;
            color: rgb(136, 255, 0);
        }

        .card p {
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="quiz.html">Quiz Upload</a>
    <a href="lab.html">Lab Upload</a>
    <a href="exam.html">Exam Upload</a>
</div>


<div class="container">
    <h1>My Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h2>3</h2>
            <p>Total Uploads</p>
        </div>
        <div class="card">
            <h2>1</h2>
            <p>Quiz Uploads</p>
        </div>
        <div class="card">
            <h2>1</h2>
            <p>Lab Uploads</p>
        </div>
        <div class="card">
            <h2>1</h2>
            <p>Exam Uploads</p>
        </div>
    </div>
</div>

</body>
</html>
