<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratory</title>

<link rel="stylesheet" href="navbar.css">

<style>

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background: #000;
    color: #bbffc1;
}

h1 {
    text-align: center;
    color: rgb(136,255,0);
    margin-top: 30px;
    text-shadow: 0 0 10px rgb(136,255,0);
}

.wrapper {
    display: flex;
    gap: 20px;
    max-width: 900px;
    margin: 30px auto;
    padding: 10px;
}

.col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #111;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #333;
}

.card img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 4px;
}

.info h3 {
    margin: 0;
    font-size: 16px;
    color: #bbffc1;
    text-shadow: 0 0 6px rgb(136,255,0);
}

.info a {
    display: inline-block;
    margin-top: 4px;
    color: rgb(136,255,0);
    text-decoration: none;
    font-size: 14px;
}

.info a:hover {
    color: white;
}

.col.right .card {
    flex-direction: row-reverse;
    text-align: right;
}

@media (max-width: 700px) {

    .wrapper {
        flex-direction: column;
    }

    .col.right .card {
        flex-direction: row;
        text-align: left;
    }

}

</style>
</head>

<body>

    </div>
</div>

            <img src="image/n.jpg">
            <div class="info">

                <a href="index.html">Open Project</a>
            </div>
        </div>

        <div class="card">
            <img src="image/m.gif">
            <div class="info">

</div>
