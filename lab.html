<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratory</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #bbffc1;
}

/* ===== NAVBAR ===== */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 20px;
    background: #0a0a0a;
    border-bottom: 2px solid #88ff00;
    z-index: 1000;
}

.menu-btn {
    display: block;
    background: none;
    border: 1px solid #88ff00;
    color: #88ff00;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
}

.nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 55px;
    right: 20px;
    background: #111;
    border: 1px solid #88ff00;
    border-radius: 6px;
    width: 160px;
    padding: 10px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    font-weight: bold;
    padding: 8px;
    text-align: center;
    border-radius: 4px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #88ff00;
    color: #000;
}

.nav-links a.active {
    background: #88ff00;
    color: #000;
}

.nav-links.show {
    display: flex;
}


h1 {
    text-align: center;
    color: rgb(136,255,0);
    margin-top: 30px;
}


.wrapper {
    display: flex;
    gap: 20px;
    max-width: 900px;
    margin: 30px auto;
    padding: 10px;
}


.col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #111;
    padding: 12px;
    border-radius: 6px;
}

.card img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 4px;
}

.info h3 {
    margin: 0;
    font-size: 16px;
    color: #bbffc1;
}

.info a {
    display: inline-block;
    margin-top: 4px;
    color: rgb(136,255,0);
    text-decoration: none;
    font-size: 14px;
}

.info a:hover {
    color: white;
}

.col.right .card {
    flex-direction: row-reverse;
    text-align: right;
}

@media (max-width: 700px) {
    .wrapper {
        flex-direction: column;
    }

    .col.right .card {
        flex-direction: row;
        text-align: left;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="quiz.html">Quiz</a>
        <a href="lab.html" class="active">Laboratory</a>
        <a href="exam.html">Exam</a>
    </div>
</div>

<h1>Laboratory</h1>

<div class="wrapper">

    <div class="col left">

        <div class="card">
            <img src="image/n.jpg">
            <div class="info">
                <h3>Portfolio</h3>
                <a href="index.html">Open Project</a>
            </div>
        </div>

        <div class="card">
            <img src="image/m.gif">
            <div class="info">
                <h3>Functions</h3>
                <a href="LAB PROJECTS/function.html">Open Project</a>
            </div>
        </div>

    </div>

    <div class="col right">

        <div class="card">
            <img src="image/ker.gif">
            <div class="info">
                <h3>Carousel</h3>
                <a href="LAB PROJECTS/carousel.html">Open Project</a>
            </div>
        </div>

        <div class="card">
            <img src="image/maki.gif">
            <div class="info">
                <h3>Register Form</h3>
                <a href="LAB PROJECTS/registerform.html">Open Project</a>
            </div>
        </div>

    </div>

</div>

<script>
function toggleMenu() {
    const nav = document.getElementById("navLinks");
    nav.classList.toggle("show");
}
</script>

</body>
</html>
