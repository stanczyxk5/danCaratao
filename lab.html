<style>

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background: #000;
    color: #bbffc1;
}

h1 {
    text-align: center;
    color: #88ff00;
    margin-top: 30px;
    text-shadow: 0 0 10px rgb(136,255,0);
}

.wrapper {
    display: flex;
    gap: 25px;
    max-width: 950px;
    margin: 30px auto;
    padding: 10px;
}

.col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.card {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #111;
    padding: 16px;
    border: 1px solid #333;
}

.card img {
    width: 65px;
    height: 65px;
    object-fit: cover;
    border: 1px solid #333;
}

.info h3 {
    margin: 0;
    font-size: 18px;
    color: #bbffc1;
}

.info a {
    display: inline-block;
    margin-top: 5px;
    color: #88ff00;
    text-decoration: none;
    font-size: 15px;
}

.info a:hover {
    color: white;
}

.col.right .card {
    flex-direction: row-reverse;
    text-align: right;
}

/* MOBILE */
@media (max-width: 700px) {

    .wrapper {
        flex-direction: column;
    }

    .col.right .card {
        flex-direction: row;
        text-align: left;
    }

}

</style>
</head>
