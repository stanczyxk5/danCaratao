<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laboratory</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #bbffc1;
}

.navbar {
    background: rgb(136,255,0);
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: black;
    font-weight: bold;
    margin: 0 15px;
    text-decoration: none;
}

h1 {
    text-align: center;
    color: rgb(136,255,0);
    margin-top: 30px;
}

/* WRAPPER */
.wrapper {
    display: flex;
    gap: 20px;
    max-width: 900px;
    margin: 30px auto;
    padding: 10px;
}

/* COLUMNS */
.col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
}


.card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #111;
    padding: 12px;
    border-radius: 6px;
}


.card img {
    width: 55px;
    height: 55px;
    object-fit: cover;
    border-radius: 4px;
}


.info h3 {
    margin: 0;
    font-size: 16px;
    color: #bbffc1;
}

.info a {
    display: inline-block;
    margin-top: 4px;
    color: rgb(136,255,0);
    text-decoration: none;
    font-size: 14px;
}

.info a:hover {
    color: white;
}


.col.right .card {
    flex-direction: row-reverse;
    text-align: right;
}


@media (max-width: 700px) {
    .wrapper {
        flex-direction: column;
    }

    .col.right .card {
        flex-direction: row;
        text-align: left;
    }
}
</style>
</head>

<body>
