<style>
    body {
        background: linear-gradient(135deg, #000000, #1a1a1a);
        margin: 0;
        font-family: Arial, sans-serif;
    }

    
    .navbar {
        background-color: rgb(136, 255, 0);
        padding: 15px 0;
        text-align: center;
        position: sticky;
        top: 0;
        box-shadow: 0 0 10px rgb(136, 255, 0);
    }

    .navbar a {
        color: black;
        text-decoration: none;
        font-weight: bold;
        margin: 0 20px;
        font-size: 15px;
        transition: 0.2s;
    }

    .navbar a:hover {
        color: white;
    }

    h1 {
        text-align: center;
        color: rgb(136, 255, 0);
        margin: 30px 0;
        text-shadow: 0 0 10px rgb(136, 255, 0);
    }

    
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
    }

    .card {
        background: #2c2c2c;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        transition: 0.3s ease;
        border: 1px solid transparent;
    }

    .card:hover {
        transform: scale(1.05);
        border: 1px solid rgb(136, 255, 0);
        box-shadow: 0 0 15px rgb(136, 255, 0);
    }

    .card h3 {
        color: #bbffc1;
        margin-bottom: 10px;
    }

    .card a {
        text-decoration: none;
        color: rgb(136, 255, 0);
        font-weight: bold;
    }

    .card a:hover {
        color: white;
    }
</style>
