<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outputs</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background-color: #000;
    color: #bbffc1;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    width: 100%;
    padding: 10px 12px;
    border-bottom: 1px solid #88ff00;
    background: #000;
    position: relative;
    z-index: 1000;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #88ff00;
    font-weight: bold;
}

.logo img {
    height: 40px;
    width: auto;
    display: block;
}

.menu-toggle {
    display: none;
    font-size: 20px;
    color: #88ff00;
    cursor: pointer;
    position: relative;
    font-weight: bold;
    letter-spacing: 2px;
}

.menu-toggle::before,
.menu-toggle::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
}

.menu-toggle::before {
    color: #00ffea;
    animation: glitch1 0.6s infinite;
}

.menu-toggle::after {
    color: #ff008c;
    animation: glitch2 0.6s infinite;
}

@keyframes glitch1 {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(-1px, -1px); }
    60% { transform: translate(2px, 0); }
    80% { transform: translate(1px, -2px); }
    100% { transform: translate(0); }
}

@keyframes glitch2 {
    0% { transform: translate(0); }
    20% { transform: translate(2px, -1px); }
    40% { transform: translate(1px, 1px); }
    60% { transform: translate(-2px, 0); }
    80% { transform: translate(-1px, 2px); }
    100% { transform: translate(0); }
}

.nav-links {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 18px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    position: relative;
    display: inline-block;
}

.nav-links a:hover {
    color: #88ff00;
    text-shadow: 0 0 6px #88ff00;
}

.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 1px;
    background: #88ff00;
    transition: 0.2s;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a::before,
.nav-links a::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0.7;
    pointer-events: none;
}

.nav-links a::before {
    color: #00ffea;
    animation: glitch1 0.6s infinite;
}

.nav-links a::after {
    color: #ff008c;
    animation: glitch2 0.6s infinite;
}

.system-right {
    color: #777;
    font-size: 13px;
}

.nav-links.active {
    display: flex;
}

.carousel {
    margin-top: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.carousel-window {
    width: 60%;
    aspect-ratio: 16 / 9;
    border: 1px solid #88ff00;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide {
    display: none;
    width: 100%;
    height: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.active {
    display: block;
}

.btn {
    background: transparent;
    border: none;
    color: #88ff00;
    font-size: 28px;
    cursor: pointer;
}

@media (max-width: 700px) {

    .menu-toggle {
        display: block;
    }

    .nav-links {
        position: absolute;
        top: 55px;
        right: 10px;
        width: 160px;
        display: none;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 10px;
        background: #000;
        border: 1px solid #88ff00;
        border-radius: 6px;
        z-index: 9999;
    }

    .system-right {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #777;
        font-size: 13px;
    }
}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">
        <img src="image/ionkno.gif">
        <span>stxnOS</span>
    </div>

    <div class="menu-toggle" id="menuToggle" data-text="1">1</div>

    <div class="nav-links" id="navLinks">
        <a href="index.html" data-text=">index@">>index@</a>
        <a href="dashboard.html" data-text=">dashboard@">>dashboard@</a>
        <a href="outputs.html" data-text=">outputs@">>outputs@</a>
    </div>

    <div class="system-right" id="time"></div>

</div>

<div class="carousel">

    <div class="btn" onclick="prevSlide()"><</div>

    <div class="carousel-window">

        <div class="slide active">
            <a href="quiz.html">
                <img src="image/cat.gif">
            </a>
        </div>

        <div class="slide">
            <a href="lab.html">
                <img src="image/duc.gif">
            </a>
        </div>

        <div class="slide">
            <a href="exam.html">
                <img src="image/sumthin.gif">
            </a>
        </div>

    </div>

    <div class="btn" onclick="nextSlide()">></div>

</div>

<script>

const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", () => {
    nav.classList.toggle("active");

    if (toggle.textContent === "1") {
        toggle.textContent = "0";
        toggle.setAttribute("data-text", "0");
    } else {
        toggle.textContent = "1";
        toggle.setAttribute("data-text", "1");
    }
});

let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

function updateTime() {
    document.getElementById("time").textContent =
        new Date().toLocaleTimeString();
}

setInterval(updateTime, 1000);
updateTime();

</script>

</body>
</html>
