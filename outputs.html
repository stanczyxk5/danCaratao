<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outputs</title>

<style>

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background-color: #000;
    color: #bbffc1;
}

.navbar {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 20px;
    border-bottom: 1px solid #88ff00;
    background: #000;
}

.logo {
    color: #88ff00;
    font-weight: bold;
}

.nav-links {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 18px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
}

.system-right {
    color: #777;
    font-size: 13px;
}


.carousel {
    margin-top: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.carousel-window {
    width: 60%;
    height: 300px;
    border: 1px solid #88ff00;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.active {
    display: block;
}


.controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn {
    background: transparent;
    border: none;
    color: #88ff00;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 22px;
    font-family: "Courier New", Courier, monospace

}

.btn:hover {
    background: #88ff00;
    color: #000;
}


</style>
</head>

<body>

<div class="navbar">
    <div class="logo">stxnOS</div>

    <div class="nav-links">
        <a href="index.html">>index@</a>
        <a href="dashboard.html">>dashboard@</a>
        <a href="outputs.html">>outputs@</a>
    </div>

    <div class="system-right" id="time"></div>
</div>

<div class="carousel">

    <div class="controls">
        <button class="btn" onclick="prevSlide()"><</button>
    </div>

    <div class="carousel-window">

        <img class="slide active" src="image/cat.gif" alt="image 1">
        <img class="slide" src="image/duc.gif" alt="image 2">
        <img class="slide" src="image/sumthin.gif" alt="image 3">

    </div>

    <div class="controls">
        <button class="btn" onclick="nextSlide()">></button>
    </<iv>

</div>
<div>
    <a href="quiz.html">queez</a>
    <a href="lab.html">laborat</a>
    <a href="exam.html">exam</a>
    
</div>
<script>

function updateTime() {
    document.getElementById("time").textContent =
        new Date().toLocaleTimeString();

setInterval(updateTime, 1000);
updateTime();
}
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") nextSlide();
    if (e.key === "ArrowLeft") prevSlide();
});

</script>

</body>
</html>
