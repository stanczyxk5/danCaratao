<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outputs</title>

<style>

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background-color: #000;
    color: #bbffc1;
}

.navbar {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 10px 20px;
    border-bottom: 1px solid #88ff00;
    background: #000;
}

.logo {
    color: #88ff00;
    font-weight: bold;
}

.nav-links {
    display: flex;
    flex: 1;
    justify-content: center;
    gap: 18px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
}

.system-right {
    color: #777;
    font-size: 13px;
}

.carousel {
    margin-top: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.carousel-window {
    width: 60%;
    height: 300px;
    border: 1px solid #88ff00;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide {
    display: none;
    width: 100%;
    height: 100%;
}
.slide a {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
}

.label {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    
    background: transparent;
    color: #88ff00;
  
    font-size: 14px;
   

    text-shadow: 0 0 8px #88ff00, 0 0 16px #88ff00;
   
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.active {
    display: block;
}

.controls {
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn {
    background: transparent;
    border: none;
    color: #88ff00;
    font-size: 28px;
    cursor: pointer;
    font-family: "Courier New", Courier, monospace;
}

.btn:hover {
    color: #bbffc1;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">stxnOS</div>

    <div class="nav-links">
        <a href="index.html">>index@</a>
        <a href="dashboard.html">>dashboard@</a>
        <a href="outputs.html">>outputs@</a>
    </div>

    <div class="system-right" id="time"></div>
</div>

<div class="carousel">

    <div class="controls">
        <button class="btn" onclick="prevSlide()"><</button>
    </div>

    <div class="carousel-window">

        <div class="slide active">
            <a href="quiz.html">
                <img src="image/cat.gif" alt="quiz">
                <div class="label">>quiz@</div>
            </a>
        </div>

        <div class="slide">
            <a href="lab.html">
                <img src="image/duc.gif" alt="lab">
                <div class="label">>laboratory$$</div>
            </a>
        </div>

        <div class="slide">
            <a href="exam.html">
                <img src="image/sumthin.gif" alt="exam">
                <div class="label">>exam&</div>
            </a>
        </div>

    </div>

    <div class="controls">
        <button class="btn" onclick="nextSlide()">></button>
    </div>

</div>

<script>

function updateTime() {
    document.getElementById("time").textContent =
        new Date().toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();

let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") nextSlide();
    if (e.key === "ArrowLeft") prevSlide();
});

</script>

</body>
</html>
