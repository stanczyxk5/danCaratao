<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: black;
            margin: 0;
        }

        .navbar {
            background-color: rgb(136, 255, 0);
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            margin: 0 25px;
            font-size: 16px;
        }

        .navbar a:hover {
            color: white;
        }

        .container {
            border: 5px solid rgb(136, 255, 0);
            width: 900px;
            padding: 20px;
            background-color: rgb(44, 44, 44);
            margin: 50px auto;
            color: #bbffc1;
            font-family: 'Times New Roman', Times, serif;
        }

        .info {
            text-align: center;
            font-weight: bold;
        }

        .info img {
            border: 2px solid #c0ffc5;
            border-radius: 50%;
        }

        .aboutMe {
            margin: 30px 0;
        }

        .aboutMe h3 {
            text-align: center;
            font-weight: bold;
        }

        .hobbies {
            margin-top: 20px;
        }
    </style>
</head>

<body id="home">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#hobbies">Hobbies</a>
</div>

<div class="container">

    <div class="info">
    <h1>EXAM UPLOADS</h1>
    </div>

</body>
</html>
