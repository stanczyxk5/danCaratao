<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Uploads</title>

<style>
body {
    background: linear-gradient(135deg, #000000, #1a1a1a);
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ===== NAVBAR ===== */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 20px;
    background: #0a0a0a;
    border-bottom: 2px solid #88ff00;
    z-index: 1000;
}

.menu-btn {
    display: block;
    background: none;
    border: 1px solid #88ff00;
    color: #88ff00;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
}

.nav-links {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 55px;
    right: 20px;
    background: #111;
    border: 1px solid #88ff00;
    border-radius: 6px;
    width: 160px;
    padding: 10px;
}

.nav-links a {
    color: #bbffc1;
    text-decoration: none;
    font-weight: bold;
    padding: 8px;
    text-align: center;
    border-radius: 4px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #88ff00;
    color: #000;
}

.nav-links a.active {
    background: #88ff00;
    color: #000;
}

.nav-links.show {
    display: flex;
}

/* ===== CONTENT ===== */
h1 {
    text-align: center;
    color: rgb(136, 255, 0);
    margin: 30px 0;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #2c2c2c;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
    border: 1px solid transparent;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid rgb(136, 255, 0);
    box-shadow: 0 0 15px rgb(136, 255, 0);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card p {
    color: #bbffc1;
    font-weight: bold;
    margin-top: 10px;
}

.quote {
    text-align: center;
    color: #bbffc1;
    font-size: 13px;
    font-style: italic;
    margin: 10px auto 10px;
    max-width: 800px;
    padding: 0 20px;
}

.author {
    text-align: center;
    color: rgb(136, 255, 0);
    font-weight: bold;
    margin-bottom: 30px;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}
</style>
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="quiz.html">Quiz</a>
        <a href="lab.html">Laboratory</a>
        <a href="exam.html" class="active">Exam</a>
    </div>
</div>

<h1>Exam Uploads</h1>

<div class="grid">

<div class="card">
    <img src="qImages/200.gif" alt="Midterms">
    <p>Midterm Exam</p>
</div>

<div class="card">
    <img src="qImages/black.gif" alt="Finals">
    <p>Final Exam</p>
</div>

</div>

<div class="quote">
    “You must see with eyes unclouded by hate. See the good in that which is evil, and the evil in that which is good. Pledge yourself to neither side.”
</div>

<div class="author">
    — <span style="font-size: 18px; font-style: italic;">Jarreth Delminguez</span>
</div>

<script>
function toggleMenu() {
    const nav = document.getElementById("navLinks");
    nav.classList.toggle("show");
}
</script>

</body>
</html>
