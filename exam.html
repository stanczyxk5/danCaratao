<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Uploads</title>

<link rel="stylesheet" href="navbar.css">

<style>

body {
    margin: 0;
    font-family: "Courier New", Courier, monospace;
    background: #000;
    color: #bbffc1;
}

/* TITLE */
h1 {
    text-align: center;
    color: rgb(136, 255, 0);
    margin: 30px 0;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    background: #111;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
    border: 1px solid #333;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid rgb(136, 255, 0);
    box-shadow: 0 0 15px rgb(136, 255, 0);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card p {
    color: #bbffc1;
    font-weight: bold;
    margin-top: 10px;
}

/* QUOTE */
.quote {
    text-align: center;
    color: #bbffc1;
    font-size: 13px;
    font-style: italic;
    margin: 10px auto 10px;
    max-width: 800px;
    padding: 0 20px;
}

/* AUTHOR */
.author {
    text-align: center;
    color: rgb(136, 255, 0);
    font-weight: bold;
    margin-bottom: 30px;
    text-shadow: 0 0 10px rgb(136, 255, 0);
}

/* NAV LINKS */
.nav-links a {
    text-decoration: none;
}

/* MOBILE */
@media (max-width: 700px) {

    .grid {
        padding: 20px;
    }

}

</style>
</head>

<body>

<div class="navbar">
    <button class="menu-btn" onclick="toggleMenu()">Menu</button>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="quiz.html">Quiz</a>
        <a href="lab.html">Laboratory</a>
        <a href="exam.html" class="active">Exam</a>
    </div>
</div>

<h1>Exam Uploads</h1>

<div class="grid">

    <div class="card">
        <img src="qImages/200.gif" alt="Midterms">
        <p>Midterm Exam</p>
    </div>

    <div class="card">
        <img src="qImages/black.gif" alt="Finals">
        <p>Final Exam</p>
    </div>

</div>

<div class="quote">
    “You must see with eyes unclouded by hate. See the good in that which is evil, and the evil in that which is good. Pledge yourself to neither side.”
</div>

<div class="author">
    — <span style="font-size: 18px; font-style: italic;">Jarreth Delminguez</span>
</div>

<script src="navbar.js"></script>

</body>
</html>
